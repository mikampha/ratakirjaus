<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syöttö</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 20px;
}

input {
  font-size: 18px;
  padding: 10px;
  width: 220px;
  margin: 6px;
}

.buttons button {
  font-size: 20px;
  padding: 15px;
  margin: 5px;
  width: 100px;
  border: none;
  border-radius: 6px;
  background: #ddd;
}

.selected {
  background: #4CAF50 !important;
  color: white;
}

.submit {
  font-size: 22px;
  padding: 15px 30px;
  margin-top: 15px;
}

#status {
  margin-top: 10px;
  font-weight: bold;
  white-space: pre-line;
}
</style>
</head>

<body>

<h2>Syöttö</h2>

<input id="user" placeholder="tunnus"><br>
<input id="pass" type="password" placeholder="salasana">

<p id="time"></p>

<div class="buttons">
  <button id="b25">25</button>
  <button id="b50">50</button>
  <button id="b100">100</button>
</div>

<br>
<input id="custom" placeholder="oma arvo">

<br>
<button class="submit" onclick="send()">Lähetä</button>

<p id="status"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxajhxknZNz_eLvCyK6zC3ohK5laiLCoGfdaTL5F3DsugXNjZu2FLtuptK4wUWJrm2xBw/exec"; // 🔥 vaihda tämä

let selectedValue = "";

// aika
setInterval(() => {
  document.getElementById("time").innerText =
    "Aika: " + new Date().toLocaleString();
}, 1000);

// napit
document.getElementById("b25").onclick = () => choose(25, "b25");
document.getElementById("b50").onclick = () => choose(50, "b50");
document.getElementById("b100").onclick = () => choose(100, "b100");

function choose(val, id) {
  selectedValue = val;

  ["b25","b50","b100"].forEach(x =>
    document.getElementById(x).classList.remove("selected")
  );

  document.getElementById(id).classList.add("selected");

  console.log("VALITTU:", selectedValue);
}

function setStatus(text, color) {
  const el = document.getElementById("status");
  el.innerText = text;
  el.style.color = color;
}

// 🚀 lähetys (DEBUG-versio)
async function send() {

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  const custom = document.getElementById("custom").value;

  let value = custom !== "" ? custom : selectedValue;

  if (!value) {
    setStatus("⚠️ Valitse arvo", "red");
    return;
  }

  try {

    console.log("📤 Lähetetään:", {user, pass, value});

    const response = await fetch(URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body:
        "user=" + encodeURIComponent(user) +
        "&pass=" + encodeURIComponent(pass) +
        "&value=" + encodeURIComponent(value) +
        "&time=" + encodeURIComponent(new Date().toISOString())
    });

    console.log("📡 HTTP status:", response.status);

    const text = (await response.text()).trim();

    console.log("📥 Server response:", text);

    if (!response.ok) {
      throw new Error("HTTP virhe: " + response.status);
    }

    if (text.startsWith("ERROR")) {
      setStatus("❌ " + text, "red");
    } else {
      setStatus("✅ Tallennettu\n" + text, "green");
    }

  } catch (err) {

    console.error("🔥 FETCH ERROR:", err);

    setStatus(
      "❌ VIRHE:\n" +
      err.message +
      "\n\nKatso console (F12)",
      "red"
    );
  }
}
</script>

</body>
</html>
