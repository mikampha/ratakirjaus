<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Syöttö</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input {
      font-size: 18px;
      padding: 10px;
      width: 220px;
      margin: 6px;
    }

    .buttons button {
      font-size: 20px;
      padding: 15px;
      margin: 5px;
      width: 100px;
      background: #ddd;
      border: none;
      border-radius: 6px;
    }

    .selected {
      background: #4CAF50 !important;
      color: white;
    }

    .submit {
      font-size: 22px;
      padding: 15px;
      margin-top: 15px;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Syöttö</h2>

<input id="username" placeholder="tunnus">
<br>
<input id="password" type="password" placeholder="salasana">

<p id="time"></p>

<p>Valitse:</p>
<div class="buttons">
  <button id="b25">25</button>
  <button id="b50">50</button>
  <button id="b100">100</button>
</div>

<p>Oma arvo:</p>
<input id="custom" type="number">

<br>
<button class="submit" onclick="submitForm()">Lähetä</button>

<p id="status"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyETl-FhlWCsI6e_oktH8hD_mnRD21BU8niWDaoA7XSdTPmZn96AjB_5CveY9_IyfH7ZA/exec"; // 🔥 VAIHDA

let selected = "";

// ✅ load user
window.onload = function() {
  const saved = localStorage.getItem("username");
  if (saved) document.getElementById("username").value = saved;
};

// ✅ button handlers (EI event-parametria)
document.getElementById("b25").onclick = () => selectVal(25, "b25");
document.getElementById("b50").onclick = () => selectVal(50, "b50");
document.getElementById("b100").onclick = () => selectVal(100, "b100");

function selectVal(val, id) {
  selected = val;

  ["b25","b50","b100"].forEach(x => {
    document.getElementById(x).classList.remove("selected");
  });

  document.getElementById(id).classList.add("selected");
}

// ✅ time
function updateTime() {
  document.getElementById("time").innerText =
    "Aika: " + new Date().toLocaleString();
}

updateTime();
setInterval(updateTime, 1000);

// ✅ submit
function submitForm() {
  const u = document.getElementById("username").value;
  const p = document.getElementById("password").value;
  const custom = document.getElementById("custom").value;

  const value = custom || selected;

  if (!value) {
    setStatus("⚠️ valitse arvo", "red");
    return;
  }

  localStorage.setItem("username", u);

  fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "user=" + encodeURIComponent(u) +
      "&pass=" + encodeURIComponent(p) +
      "&value=" + encodeURIComponent(value) +
      "&time=" + encodeURIComponent(new Date().toISOString())
  })
  .then(r => r.text())
  .then(txt => {

    console.log("Server:", txt);

    .then(txt => {

  txt = txt.trim(); // 🔥 tärkein rivi

  if (txt.startsWith("ERROR")) {
    setStatus("❌ " + txt, "red");
  } else {
    setStatus("✅ Tallennettu", "green");
  }

})


      document.getElementById("custom").value = "";
      selected = "";
      ["b25","b50","b100"].forEach(x =>
        document.getElementById(x).classList.remove("selected")
      );
    }

  })
  .catch(err => {
    console.error(err);
    setStatus("❌ verkko- tai URL-virhe", "red");
  });
}

function setStatus(text, color) {
  const s = document.getElementById("status");
  s.innerText = text;
  s.style.color = color;
}
</script>

</body>
</html>
