<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Syöttö6</title>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 25px;
}

input {
  font-size: 18px;
  padding: 10px;
  width: 220px;
  margin: 5px;
}

.buttons button {
  font-size: 20px;
  padding: 15px;
  margin: 5px;
  width: 100px;
  border: none;
  border-radius: 6px;
  background: #ddd;
}

.buttons button.selected {
  background: #4CAF50;
  color: white;
}

.submit {
  font-size: 22px;
  padding: 15px 30px;
  margin-top: 15px;
}

#status {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>Syöttö6</h2>

<input id="user" placeholder="tunnus"><br>
<input id="pass" type="password" placeholder="salasana">

<p id="time"></p>

<p>Valitse:</p>

<div class="buttons">
  <button onclick="choose(25, this)">25</button>
  <button onclick="choose(50, this)">50</button>
  <button onclick="choose(100, this)">100</button>
</div>

<p>Oma arvo:</p>
<input id="custom" type="number" placeholder="esim. 42">

<br>
<button class="submit" onclick="send()">Lähetä</button>

<p id="status"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz-pe2H0GF4Gnjsr8HnkVf4sx3lEI8K5yiWq9AGczKJF1l-IsulCBelkkSiuPeWarpcZQ/exec"; // 🔥 vaihda

let selectedValue = "";

// aika
setInterval(() => {
  document.getElementById("time").innerText =
    "Aika: " + new Date().toLocaleString();
}, 1000);

// valinta
function choose(val, btn) {
  selectedValue = val;

  document.querySelectorAll(".buttons button")
    .forEach(b => b.classList.remove("selected"));

  btn.classList.add("selected");

  console.log("VALITTU:", selectedValue);
}

// status
function setStatus(txt, color) {
  const el = document.getElementById("status");
  el.innerText = txt;
  el.style.color = color;
}

// lähetys
function send() {

  const user = document.getElementById("user").value.trim();
  const pass = document.getElementById("pass").value.trim();
  const custom = document.getElementById("custom").value.trim();

  if (!selectedValue) {
    setStatus("⚠️ valitse 25 / 50 / 100", "red");
    return;
  }

  if (!user || !pass) {
    setStatus("⚠️ anna tunnus ja salasana", "red");
    return;
  }

  console.log("SEND:", {
    preset: selectedValue,
    custom: custom
  });

  fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "user=" + encodeURIComponent(user) +
      "&pass=" + encodeURIComponent(pass) +
      "&preset=" + encodeURIComponent(selectedValue) + // 🔥 nappi
      "&custom=" + encodeURIComponent(custom) +       // 🔥 oma arvo
      "&time=" + encodeURIComponent(new Date().toISOString())
  })
  .then(r => r.text())
  .then(txt => {
    txt = txt.trim();

    if (txt.startsWith("ERROR")) {
      setStatus("❌ " + txt, "red");
    } else {
      setStatus("✅ Tallennettu", "green");

      // reset UI
      selectedValue = "";
      document.getElementById("custom").value = "";
      document.querySelectorAll(".buttons button")
        .forEach(b => b.classList.remove("selected"));
    }
  })
  .catch(err => {
    setStatus("❌ " + err.message, "red");
  });
}
</script>

</body>
</html>
