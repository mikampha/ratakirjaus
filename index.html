<!DOCTYPE html>
<html>
<body>

<h3>Syöttö</h3>

<input id="user" placeholder="tunnus"><br>
<input id="pass" type="password" placeholder="salasana"><br><br>

<button onclick="select(25)">25</button>
<button onclick="select(50)">50</button>
<button onclick="select(100)">100</button>

<br><br>

<input id="custom" placeholder="oma arvo"><br><br>

<button onclick="send()">Lähetä</button>

<p id="status"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycbz-pe2H0GF4Gnjsr8HnkVf4sx3lEI8K5yiWq9AGczKJF1l-IsulCBelkkSiuPeWarpcZQ/exec"; // 🔥 vaihda tämä

let selected = null;

function select(val) {
  selected = val;
  console.log("SELECTED:", selected);
}

function send() {

  const user = document.getElementById("user").value;
  const pass = document.getElementById("pass").value;
  const custom = document.getElementById("custom").value;

  let value;

  if (custom !== "") {
    value = custom;
  } else if (selected !== null) {
    value = selected;
  } else {
    document.getElementById("status").innerText = "Valitse arvo!";
    return;
  }

  console.log("SENT VALUE:", value);

  fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "user=" + encodeURIComponent(user) +
      "&pass=" + encodeURIComponent(pass) +
      "&value=" + encodeURIComponent(value)
  })
  .then(r => r.text())
  .then(t => {
    document.getElementById("status").innerText = t;
  });
}
</script>

</body>
</html>
