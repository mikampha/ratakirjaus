<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ratakirjaus5</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    input {
      font-size: 18px;
      padding: 10px;
      width: 220px;
      margin: 5px;
    }

    .buttons button {
      font-size: 20px;
      padding: 15px;
      margin: 5px;
      width: 100px;
      background: #ddd;
      border: none;
      border-radius: 6px;
    }

    .selected {
      background: #4CAF50 !important;
      color: white;
    }

    .submit {
      font-size: 22px;
      padding: 15px;
      margin-top: 15px;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h2>Ratakirjaus5</h2>

<input id="username" placeholder="tunnus"><br>
<input id="password" type="password" placeholder="salasana"><br>

<p id="time"></p>

<p>Valitse:</p>
<div class="buttons">
  <button id="b25">25</button>
  <button id="b50">50</button>
  <button id="b100">100</button>
</div>

<p>Oma arvo:</p>
<input id="custom" type="number">

<br>
<button class="submit" onclick="submitForm()">Lähetä</button>

<p id="status"></p>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyETl-FhlWCsI6e_oktH8hD_mnRD21BU8niWDaoA7XSdTPmZn96AjB_5CveY9_IyfH7ZA/exec"; // 🔥 vaihda tämä

let selected = "";

// ✅ muista käyttäjä
window.onload = function() {
  const saved = localStorage.getItem("username");
  if (saved) document.getElementById("username").value = saved;
};

// ✅ napit ilman event bugia
document.getElementById("b25").onclick = () => selectVal(25, "b25");
document.getElementById("b50").onclick = () => selectVal(50, "b50");
document.getElementById("b100").onclick = () => selectVal(100, "b100");

function selectVal(val, id) {
  selected = val;

  ["b25", "b50", "b100"].forEach(x => {
    document.getElementById(x).classList.remove("selected");
  });

  document.getElementById(id).classList.add("selected");
}

// ✅ aika
function updateTime() {
  document.getElementById("time").innerText =
    "Aika: " + new Date().toLocaleString();
}

updateTime();
setInterval(updateTime, 1000);

// ✅ status helper
function setStatus(text, color) {
  const s = document.getElementById("status");
  s.innerText = text;
  s.style.color = color;
}

function submitForm() {

  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();
  const custom = document.getElementById("custom").value;

  const customVal = custom.trim();

  // 🔥 etsitään valittu nappi DOM:ista
  let selectedButton = document.querySelector(".buttons .selected");
  let selectedValue = selectedButton ? selectedButton.innerText : "";
  
  // ✅ lopullinen arvo
  const value = customVal !== "" ? customVal : selectedValue;
  const value = customVal !== "" ? customVal : selected;

  if (!value) {
    setStatus("⚠️ valitse tai syötä arvo", "red");
    return;
  }

  if (!u || !p) {
    setStatus("⚠️ anna tunnus ja salasana", "red");
    return;
  }

  localStorage.setItem("username", u);

  fetch(URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded"
    },
    body:
      "user=" + encodeURIComponent(u) +
      "&pass=" + encodeURIComponent(p) +
      "&value=" + encodeURIComponent(value) +
      "&time=" + encodeURIComponent(new Date().toISOString())
  })
  .then(r => r.text())
  .then(txt => {
    txt = txt.trim();

    if (txt.startsWith("ERROR")) {
      setStatus("❌ " + txt, "red");
      return;
    }

    setStatus("✅ Tallennettu", "green");

    // reset
    selected = "";
    document.getElementById("custom").value = "";

    ["b25","b50","b100"].forEach(id =>
      document.getElementById(id).classList.remove("selected")
    );
  })
  .catch(() => {
    setStatus("❌ yhteysvirhe", "red");
  });
}</script>

</body>
</html>
