<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Syöttö</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 20px;
    }

    h2 {
      margin-bottom: 10px;
    }

    input {
      font-size: 18px;
      padding: 10px;
      width: 220px;
      margin: 6px;
    }

    .buttons button {
      font-size: 20px;
      padding: 15px;
      margin: 5px;
      width: 100px;
      border: none;
      background: #ddd;
      border-radius: 6px;
    }

    .buttons button.selected {
      background: #4CAF50;
      color: white;
    }

    .time {
      margin: 10px;
      font-size: 18px;
    }

    .submit {
      margin-top: 15px;
      font-size: 22px;
      padding: 15px 30px;
    }

    #status {
      margin-top: 10px;
      font-size: 18px;
    }
  </style>
</head>

<body>

<h2>Syöttö</h2>

<!-- käyttäjä -->
<p>Käyttäjä:</p>
<input id="username" placeholder="tunnus">

<p>Salasana:</p>
<input id="password" type="password" placeholder="salasana">

<!-- aika -->
<div class="time" id="time"></div>

<!-- valinta -->
<p>Valitse:</p>
<div class="buttons">
  <button onclick="selectVal(25, event)">25</button>
  <button onclick="selectVal(50, event)">50</button>
  <button onclick="selectVal(100, event)">100</button>
</div>

<!-- oma arvo -->
<p>Oma arvo:</p>
<input id="custom" type="number" placeholder="esim. 42">

<br>

<button class="submit" onclick="submitForm()">Lähetä</button>

<p id="status"></p>

<script>
  const URL = "https://script.google.com/macros/s/AKfycbwb32UyKkM7oIkZLODUb9gh0m3I3H2eo15Wqe2q0LCfLAd2zrfkOt3SVmdumpj-whuelg/exec"; // 🔥 VAIHDA TÄMÄ

  let selected = "";

  // 🔐 muista username selaimessa
  window.onload = function() {
    const savedUser = localStorage.getItem("username");
    if (savedUser) {
      document.getElementById("username").value = savedUser;
    }
  };

  // 🔘 nappivalinta
  function selectVal(val, e) {
    selected = val;

    document.querySelectorAll(".buttons button").forEach(btn => {
      btn.classList.remove("selected");
    });

    e.target.classList.add("selected");
  }

  // 🕒 kellonaika
  function updateTime() {
    const now = new Date();
    document.getElementById("time").innerText =
      "Aika: " + now.toLocaleString();
  }

  updateTime();
  setInterval(updateTime, 1000);

  // 🚀 submit
  function submitForm() {
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const custom = document.getElementById("custom").value;

    const value = custom || selected;

    if (!value) {
      document.getElementById("status").innerText =
        "⚠️ Valitse tai syötä arvo";
      return;
    }

    // ✅ tallenna käyttäjä selaimeen
    localStorage.setItem("username", username);

    const now = new Date().toISOString();

    fetch(URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/x-www-form-urlencoded"
      },
      body:
        "user=" + encodeURIComponent(username) +
        "&pass=" + encodeURIComponent(password) +
        "&value=" + encodeURIComponent(value) +
        "&time=" + encodeURIComponent(now)
    })
    .then(r => r.text())
    .then(() => {
      document.getElementById("status").innerText =
        "✅ Tallennettu";

      document.getElementById("custom").value = "";

      // poistetaan valinta UI:sta
      document.querySelectorAll(".buttons button").forEach(btn => {
        btn.classList.remove("selected");
      });

      selected = "";
    })
    .catch(() => {
      document.getElementById("status").innerText =
        "❌ Virhe lähetyksessä";
    });
  }
</script>

</body>
</html>
